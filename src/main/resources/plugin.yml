name: minigames
version: '1.0-SNAPSHOT'
main: cz.misakplak.minigames.Minigames
api-version: '1.21'
authors: [ misakplak ]
description: just a mod

commands:

  rebirth:
    description: a minigame to progress with rebirths
    usage: /rebirth
    permission: rebirth

  reset:
    description: reset your rebirth levels
    usage: /rebirthreset
    permission: rebirth.reset

  spleef:
    description: splieef minigame
    usage: /spleef settp and /spleef gui


  spleefarena:
    description: spleefgui



  minigamessetspawn:
    description: setspawn

  permissions:
    minigames.barrier:
      default: op